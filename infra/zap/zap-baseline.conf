# OWASP ZAP baseline — configuración de reglas
# Formato: <id_regla>\t<acción>\t(comentario)
# Acciones: IGNORE / WARN / FAIL
# Lista de reglas: https://www.zaproxy.org/docs/alerts/

# ── Fallar el escaneo en hallazgos críticos ──────────────────────
10020	FAIL	(Anti-clickjacking: falta X-Frame-Options/CSP frame-ancestors)
10021	FAIL	(X-Content-Type-Options ausente)
10038	FAIL	(Content-Security-Policy ausente)
10054	FAIL	(Cookie sin SameSite)
10055	FAIL	(CSP mal configurada)
40012	FAIL	(XSS reflejado)
40014	FAIL	(XSS persistente)
40018	FAIL	(Inyección SQL)
90022	FAIL	(Application Error Disclosure)

# ── Advertir, no bloquear ────────────────────────────────────────
10027	WARN	(Comentarios sospechosos en respuestas)
10063	WARN	(Permissions-Policy ausente)
10096	WARN	(Timestamp disclosure)
10109	WARN	(Modern Web Application — informativo)

# ── Ignorar (entorno local, sin TLS) ─────────────────────────────
10011	IGNORE	(Cookie sin Secure: local corre en HTTP)
10015	IGNORE	(Cache-control: APIs JSON, gestionado por servicio)
