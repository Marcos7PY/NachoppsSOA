# Overlay de Docker secrets (plan 2.3).
#
# Saca JWT_*, DATABASE_URL y RABBITMQ_URI del entorno en claro y los inyecta como
# Docker secrets en /run/secrets/*. El entrypoint (infra/entrypoint.sh) carga
# <VAR>_FILE → <VAR> en arranque, así que el valor real vive solo en el secreto.
#
# Uso:
#   1) Crear los archivos de secreto en infra/secrets/ (ver docs/operacion/secrets.md).
#   2) En el .env, poner PLACEHOLDERS para los ${VAR:?} de prod (DB_PASS, JWT_*…):
#      el entrypoint los sobrescribe con el contenido de los secretos.
#   3) docker compose -f docker-compose.prod.yml -f docker-compose.secrets.yml up -d
#
# La clave PÚBLICA no es secreta; se incluye solo por consistencia del flujo.

secrets:
  jwt_private_key:
    file: ./secrets/jwt_private_key
  jwt_public_key:
    file: ./secrets/jwt_public_key
  service_jwt_secret:
    file: ./secrets/service_jwt_secret
  rabbitmq_uri:
    file: ./secrets/rabbitmq_uri
  database_url_identidad:
    file: ./secrets/database_url_identidad
  database_url_mesas:
    file: ./secrets/database_url_mesas
  database_url_pedidos:
    file: ./secrets/database_url_pedidos
  database_url_cuentas:
    file: ./secrets/database_url_cuentas
  database_url_reservas:
    file: ./secrets/database_url_reservas
  database_url_inventario:
    file: ./secrets/database_url_inventario
  database_url_notificaciones:
    file: ./secrets/database_url_notificaciones
  database_url_caja:
    file: ./secrets/database_url_caja
  database_url_reportes:
    file: ./secrets/database_url_reportes

# Env común que apunta cada secreto compartido a su archivo en /run/secrets.
x-secret-file-env: &secret-file-env
  JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
  SERVICE_JWT_SECRET_FILE: /run/secrets/service_jwt_secret
  RABBITMQ_URI_FILE: /run/secrets/rabbitmq_uri

services:
  servicio-identidad:
    environment:
      <<: *secret-file-env
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      DATABASE_URL_FILE: /run/secrets/database_url_identidad
    secrets: [jwt_public_key, service_jwt_secret, rabbitmq_uri, jwt_private_key, database_url_identidad]

  servicio-mesas:
    environment:
      <<: *secret-file-env
      DATABASE_URL_FILE: /run/secrets/database_url_mesas
    secrets: [jwt_public_key, service_jwt_secret, rabbitmq_uri, database_url_mesas]

  servicio-pedidos:
    environment:
      <<: *secret-file-env
      DATABASE_URL_FILE: /run/secrets/database_url_pedidos
    secrets: [jwt_public_key, service_jwt_secret, rabbitmq_uri, database_url_pedidos]

  servicio-cuentas:
    environment:
      <<: *secret-file-env
      DATABASE_URL_FILE: /run/secrets/database_url_cuentas
    secrets: [jwt_public_key, service_jwt_secret, rabbitmq_uri, database_url_cuentas]

  servicio-reservas:
    environment:
      <<: *secret-file-env
      DATABASE_URL_FILE: /run/secrets/database_url_reservas
    secrets: [jwt_public_key, service_jwt_secret, rabbitmq_uri, database_url_reservas]

  servicio-inventario:
    environment:
      <<: *secret-file-env
      DATABASE_URL_FILE: /run/secrets/database_url_inventario
    secrets: [jwt_public_key, service_jwt_secret, rabbitmq_uri, database_url_inventario]

  servicio-notificaciones:
    environment:
      <<: *secret-file-env
      DATABASE_URL_FILE: /run/secrets/database_url_notificaciones
    secrets: [jwt_public_key, service_jwt_secret, rabbitmq_uri, database_url_notificaciones]

  servicio-caja:
    environment:
      <<: *secret-file-env
      DATABASE_URL_FILE: /run/secrets/database_url_caja
    secrets: [jwt_public_key, service_jwt_secret, rabbitmq_uri, database_url_caja]

  servicio-reportes:
    environment:
      <<: *secret-file-env
      DATABASE_URL_FILE: /run/secrets/database_url_reportes
    secrets: [jwt_public_key, service_jwt_secret, rabbitmq_uri, database_url_reportes]
