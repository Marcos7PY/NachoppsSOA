version: '3.8'

services:
  # --- INFRAESTRUCTURA COMPARTIDA ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: nachopps-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: nachopps
      RABBITMQ_DEFAULT_PASS: nachopps_secret
    profiles: ["infra", "all", "dev"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BASES DE DATOS (UNA POR SERVICIO) ---
  db-reservas:
    image: postgres:16-alpine
    container_name: nachopps-db-reservas
    environment:
      POSTGRES_USER: nachopps
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: reservas_db
    ports: ["5441:5432"]
    profiles: ["infra", "all", "dev"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nachopps -d reservas_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-mesas:
    image: postgres:16-alpine
    container_name: nachopps-db-mesas
    environment:
      POSTGRES_USER: nachopps
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mesas_db
    ports: ["5433:5432"]
    profiles: ["infra", "all", "dev"]

  db-pedidos:
    image: postgres:16-alpine
    container_name: nachopps-db-pedidos
    environment:
      POSTGRES_USER: nachopps
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: pedidos_db
    ports: ["5434:5432"]
    profiles: ["infra", "all", "dev"]

  db-cuentas:
    image: postgres:16-alpine
    container_name: nachopps-db-cuentas
    environment:
      POSTGRES_USER: nachopps
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cuentas_db
    ports: ["5435:5432"]
    profiles: ["infra", "all", "dev"]

  db-inventario:
    image: postgres:16-alpine
    container_name: nachopps-db-inventario
    environment:
      POSTGRES_USER: nachopps
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: inventario_db
    ports: ["5436:5432"]
    profiles: ["infra", "all", "dev"]

  db-caja:
    image: postgres:16-alpine
    container_name: nachopps-db-caja
    environment:
      POSTGRES_USER: nachopps
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: caja_db
    ports: ["5437:5432"]
    profiles: ["infra", "all", "dev"]

  db-reportes:
    image: postgres:16-alpine
    container_name: nachopps-db-reportes
    environment:
      POSTGRES_USER: nachopps
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: reportes_db
    ports: ["5438:5432"]
    profiles: ["infra", "all", "dev"]

  db-identidad:
    image: postgres:16-alpine
    container_name: nachopps-db-identidad
    environment:
      POSTGRES_USER: nachopps
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: identidad_db
    ports: ["5439:5432"]
    profiles: ["infra", "all", "dev"]

  db-notificaciones:
    image: postgres:16-alpine
    container_name: nachopps-db-notificaciones
    environment:
      POSTGRES_USER: nachopps
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: notificaciones_db
    ports: ["5440:5432"]
    profiles: ["infra", "all", "dev"]

  # --- API GATEWAY (KONG) — modo declarativo (sin Postgres propio) ---
  kong:
    image: kong:3.9
    container_name: nachopps-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["infra", "all", "dev"]
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
