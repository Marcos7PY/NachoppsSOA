      RABBITMQ_URI: 'amqp://nachopps:nachopps_secret@rabbitmq:5672'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector:4318'
      INVENTARIO_SERVICE_URL: 'http://servicio-inventario:3000/api'
