      RABBITMQ_URI: 'amqp://nachopps:nachopps_secret@rabbitmq:5672'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector:4318'
      JWT_PUBLIC_KEY: *jwt_public
      SERVICE_JWT_SECRET: 'nachopps_service_secret_dev'
    profiles: ['all']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/telemetry/metrics']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db-reportes:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ═══════════════════════════════════════════════════
  # KONG API GATEWAY (con jwt-cache)
  # ═══════════════════════════════════════════════════
  kong:
    build:
      context: kong
      dockerfile: Dockerfile
    image: infra-kong
    container_name: nachopps-kong
    environment:
      KONG_DATABASE: 'off'
      # No exponer versión de Kong/nginx en cabeceras (hallazgo ZAP 10036)
      KONG_HEADERS: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_PLUGINS: 'bundled,jwt-cache'
      KONG_JWT_PUBLIC_KEY: *jwt_public
      KONG_RATE_LIMIT_MINUTE: ${KONG_RATE_LIMIT_MINUTE:-3000}
      KONG_RATE_LIMIT_HOUR: ${KONG_RATE_LIMIT_HOUR:-30000}
      KONG_CORS_ORIGINS: ${KONG_CORS_ORIGINS:-["http://localhost:4200","http://localhost:4201","http://localhost:5173","http://127.0.0.1:4200","http://127.0.0.1:4201","http://127.0.0.1:5173"]}
      KONG_NGINX_HTTP_LUA_SHARED_DICT: 'jwt_cache 12m'
    ports:
      - '8000:8000'
      - '8001:8001'
    volumes:
      - ./kong/kong.yml.template:/tmp/kong.yml.template:ro
    profiles: ['infra', 'all', 'dev']
    healthcheck:
      test: ['CMD', 'kong', 'health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ═══════════════════════════════════════════════════
  # OBSERVABILIDAD
  # ═══════════════════════════════════════════════════
  otel-collector:
    image: jaegertracing/all-in-one:latest
    container_name: nachopps-jaeger
    ports:
      - '16686:16686'
      - '4318:4318'
      - '4317:4317'
    profiles: ['infra', 'all', 'dev']

  prometheus:
    image: prom/prometheus:latest
    container_name: nachopps-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    profiles: ['infra', 'all', 'dev']

  alertmanager:
    image: prom/alertmanager:latest
    container_name: nachopps-alertmanager
    ports:
      - '9093:9093'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    profiles: ['infra', 'all', 'dev']

  grafana:
    image: grafana/grafana:latest
    container_name: nachopps-grafana
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    profiles: ['infra', 'all', 'dev']

  # Agregación de logs estructurados (plan 5.1): Loki almacena, Promtail recoge
  # el stdout JSON (con trace_id/correlationId) de los contenedores.
  loki:
    image: grafana/loki:2.9.0
    container_name: nachopps-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - '3100:3100'
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    profiles: ['infra', 'all', 'dev']

  promtail:
    image: grafana/promtail:2.9.0
    container_name: nachopps-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    profiles: ['infra', 'all', 'dev']

  pwa-cliente:
    build:
      context: ../
      dockerfile: apps/pwa-cliente/Dockerfile
    image: infra-pwa-cliente
    container_name: nachopps-pwa-cliente
    ports:
      - '4200:8080'
    profiles: ['all']

volumes:
  nachopps-db-reservas:
  nachopps-db-mesas:
  nachopps-db-pedidos:
  nachopps-db-cuentas:
  nachopps-db-inventario:
  nachopps-db-caja:
  nachopps-db-reportes:
  nachopps-db-identidad:
  nachopps-db-notificaciones:
