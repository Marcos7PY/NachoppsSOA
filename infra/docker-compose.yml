  # ═══════════════════════════════════════════════════
  # MICROSERVICIOS
  # ═══════════════════════════════════════════════════
  servicio-identidad:
    image: infra-servicio-identidad
    container_name: nachopps-servicio-identidad
    ports: ['3001:3000']
    environment:
      PORT: '3000'
      DATABASE_URL: 'postgresql://nachopps:secret@db-identidad:5432/identidad_db?schema=public'
      SERVICE_NAME: 'servicio-identidad'
      SERVICE_AUD_ENFORCE: 'true'
      RABBITMQ_URI: 'amqp://nachopps:nachopps_secret@rabbitmq:5672'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector:4318'
      JWT_PUBLIC_KEY: *jwt_public
      SERVICE_JWT_SECRET: 'nachopps_service_secret_dev'
      JWT_EXPIRES_IN: '15m'
      REFRESH_TOKEN_TTL_DAYS: '7'
      JWT_PRIVATE_KEY: *jwt_private
      COOKIE_SECURE: 'false'
      COOKIE_SAMESITE: 'strict'
    profiles: ['all']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/telemetry/metrics']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db-identidad:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

