    image: ${REGISTRY:-nachopps}/servicio-identidad:latest
    container_name: nachopps-servicio-identidad
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      PORT: '3000'
      DATABASE_URL: 'postgresql://${DB_USER:-nachopps}:${DB_PASS:?DB_PASS es obligatorio en produccion}@db-identidad:5432/identidad_db?schema=public'
      SERVICE_NAME: 'servicio-identidad'
      RABBITMQ_URI: 'amqp://${RABBITMQ_USER:-nachopps}:${RABBITMQ_PASS:?RABBITMQ_PASS es obligatorio en produccion}@rabbitmq:5672'
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY es obligatorio (PEM RS256, \n literales)}
      SERVICE_JWT_SECRET: ${SERVICE_JWT_SECRET:?SERVICE_JWT_SECRET es obligatorio (tokens S2S internos)}
      NODE_ENV: 'production'
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN es obligatorio, p.ej. https://app.tudominio.com}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY es obligatorio en identidad (PEM RS256)}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/telemetry/metrics']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db-identidad:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

