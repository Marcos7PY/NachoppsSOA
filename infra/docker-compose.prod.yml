services:
  # ═══════════════════════════════════════════════════
  # INFRAESTRUCTURA COMPARTIDA
  # ═══════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3-management
    container_name: nachopps-rabbitmq
    restart: unless-stopped
    # Sin puertos expuestos al host
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nachopps}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS es obligatorio en produccion}
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 10s
      timeout: 5s
      retries: 5

  # BASES DE DATOS (Solo red interna)
  db-reservas:
    image: postgres:16-alpine
    container_name: nachopps-db-reservas
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-nachopps}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS es obligatorio en produccion}
      POSTGRES_DB: reservas_db
    volumes:
      - nachopps-db-reservas:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-nachopps} -d reservas_db']
      interval: 5s
      timeout: 3s
      retries: 5

  db-mesas:
    image: postgres:16-alpine
    container_name: nachopps-db-mesas
