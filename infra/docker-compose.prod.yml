  # ═══════════════════════════════════════════════════
  # KONG API GATEWAY (Punto único de acceso)
  # ═══════════════════════════════════════════════════
  kong:
    build:
      context: kong
      dockerfile: Dockerfile
    image: ${REGISTRY:-nachopps}/kong:latest
    container_name: nachopps-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # Admin API solo en loopback DENTRO del contenedor: inalcanzable desde la
      # red de Docker y desde el host. Para administrar: `docker exec` o túnel SSH.
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_PLUGINS: 'bundled,jwt-cache'
      KONG_JWT_PUBLIC_KEY: ${KONG_JWT_PUBLIC_KEY:?KONG_JWT_PUBLIC_KEY es obligatorio (PEM RS256, \n literales)}
      KONG_RATE_LIMIT_MINUTE: ${KONG_RATE_LIMIT_MINUTE:-3000}
      KONG_RATE_LIMIT_HOUR: ${KONG_RATE_LIMIT_HOUR:-30000}
      # Dominio(s) https reales de la PWA. Obligatorio en producción.
      KONG_CORS_ORIGINS: ${KONG_CORS_ORIGINS:?KONG_CORS_ORIGINS es obligatorio, p.ej. ["https://app.tudominio.com"]}
      KONG_NGINX_HTTP_LUA_SHARED_DICT: 'jwt_cache 12m'
    ports:
      - '80:8000'
      - '443:8443'
      # La Admin API (8001) NO se publica en prod: queda en loopback interno.
    volumes:
      - ./kong/kong.yml.template:/tmp/kong.yml.template:ro
    healthcheck:
      test: ['CMD', 'kong', 'health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ═══════════════════════════════════════════════════
  # OBSERVABILIDAD
  # ═══════════════════════════════════════════════════
  otel-collector:
    image: jaegertracing/all-in-one:latest
    container_name: nachopps-jaeger
    restart: unless-stopped
    # Sin exponer puertos en prod o exponer solo el de grafana
    ports:
      - '16686:16686'

  prometheus:
    image: prom/prometheus:latest
    container_name: nachopps-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro

  alertmanager:
    image: prom/alertmanager:latest
    container_name: nachopps-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: nachopps-grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  # Backups de las 9 BDs (plan 3.5): pg_dump diario + retención. Para almacenar
  # fuera del host, montar un bind a un volumen de red/objeto o sincronizar
  # nachopps-backups a S3 con un job aparte.
  db-backup:
    image: postgres:16-alpine
    container_name: nachopps-db-backup
    environment:
      DB_USER: ${DB_USER:-nachopps}
      DB_PASS: ${DB_PASS:?DB_PASS es obligatorio en produccion}
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_DIR: /backups
    volumes:
      - ../scripts/backup-postgres.sh:/usr/local/bin/backup.sh:ro
      - nachopps-backups:/backups
    entrypoint: ['/bin/sh', '-c', 'while true; do sh /usr/local/bin/backup.sh || echo "[db-backup] ciclo con fallos"; sleep 86400; done']
    restart: unless-stopped

volumes:
  nachopps-backups:
  nachopps-db-reservas:
  nachopps-db-mesas:
  nachopps-db-pedidos:
  nachopps-db-cuentas:
  nachopps-db-inventario:
  nachopps-db-caja:
  nachopps-db-reportes:
  nachopps-db-identidad:
  nachopps-db-notificaciones:
