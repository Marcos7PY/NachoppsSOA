# SonarQube Community Edition — análisis estático local
# Levantar:  docker compose -f infra/sonarqube/docker-compose.sonarqube.yml up -d
# UI:        http://localhost:9000  (admin/admin en el primer arranque; cambiar la clave)
# Escanear:  pwsh scripts/sonar-scan.ps1 -Token <token generado en la UI>

services:
  sonarqube:
    image: sonarqube:community
    container_name: nachopps-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: 'true'
    ports:
      - '9000:9000'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ['CMD-SHELL', "curl -sf http://localhost:9000/api/system/status | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  sonar-db:
    image: postgres:16-alpine
    container_name: nachopps-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sonar']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:
