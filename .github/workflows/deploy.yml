name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  REGISTRY_NAME: ghcr.io/marcos7py/nachoppssoa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: servicio-identidad
            dockerfile: Dockerfile
            context: .
            build-args: APP_NAME=servicio-identidad
          - name: servicio-mesas
            dockerfile: Dockerfile
            context: .
            build-args: APP_NAME=servicio-mesas
          - name: servicio-pedidos
            dockerfile: Dockerfile
            context: .
            build-args: APP_NAME=servicio-pedidos
          - name: servicio-cuentas
            dockerfile: Dockerfile
            context: .
            build-args: APP_NAME=servicio-cuentas
          - name: servicio-reservas
            dockerfile: Dockerfile
            context: .
            build-args: APP_NAME=servicio-reservas
          - name: servicio-inventario
            dockerfile: Dockerfile
            context: .
            build-args: APP_NAME=servicio-inventario
          - name: servicio-notificaciones
            dockerfile: Dockerfile
            context: .
            build-args: APP_NAME=servicio-notificaciones
          - name: servicio-caja
            dockerfile: Dockerfile
            context: .
            build-args: APP_NAME=servicio-caja
          - name: servicio-reportes
            dockerfile: Dockerfile
            context: .
            build-args: APP_NAME=servicio-reportes
          - name: pwa-cliente
            dockerfile: apps/pwa-cliente/Dockerfile
            context: .
            build-args: VITE_API_BASE_URL=https://nachopps-app.duckdns.org
          - name: kong
            dockerfile: infra/kong/Dockerfile
            context: infra/kong
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          build-args: ${{ matrix.service.build-args }}
          tags: ${{ env.REGISTRY_NAME }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
