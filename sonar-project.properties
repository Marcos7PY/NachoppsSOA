# SonarQube — análisis estático del monorepo Nx
# Ejecutar con: pwsh scripts/sonar-scan.ps1  (requiere SonarQube levantado, ver infra/sonarqube)

sonar.projectKey=nachopps-restobar
sonar.projectName=Nachopps Restobar
sonar.projectVersion=1.0

sonar.sources=apps,libs
sonar.tests=apps,libs
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/jest.config.ts,**/vite.config.*,**/webpack.config.*,**/*-e2e/**

sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPaths=tsconfig.base.json

# Cobertura: generar antes con `npm exec nx run-many -t test -- --coverage`
sonar.javascript.lcov.reportPaths=coverage/**/lcov.info

# Quality gate: esperar resultado en CI
sonar.qualitygate.wait=true
